# The `slack-token` key is provisioned out-of-band (External Secrets
# Operator / Sealed Secrets / SOPS) — same convention as auth-service's own
# credentials Secret. This file documents the shape only; never commit a
# real token here.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: forgeops
type: Opaque
stringData:
  slack-token: "REPLACE_OUT_OF_BAND"
