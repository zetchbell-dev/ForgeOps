apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: forgeops
data:
  service.slack: |
    token: $slack-token

  template.on-sync-succeeded: |
    message: |
      ✅ {{.app.metadata.name}} synced successfully to revision {{.app.status.sync.revision}}

  template.on-sync-failed: |
    message: |
      ❌ {{.app.metadata.name}} sync failed: {{.app.status.operationState.message}}

  template.on-health-degraded: |
    message: |
      ⚠️ {{.app.metadata.name}} health degraded: {{.app.status.health.status}}

  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [on-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [on-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [on-health-degraded]

  subscriptions: |
    - recipients:
        - slack:forgeops-deploys
      triggers:
        - on-sync-succeeded
        - on-sync-failed
        - on-health-degraded
