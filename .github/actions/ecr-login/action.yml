# Composite action: ECR login
#
# Assumes an AWS IAM role via OIDC and logs Docker into the given ECR
# registry. Safe to call unconditionally: if role-to-assume is empty (the
# common case for PR builds that only build+scan, never push), both steps
# are skipped rather than failing on missing credentials.
#
# The calling job still needs `permissions: id-token: write` itself —
# a composite action can't grant permissions to the job that calls it.

name: "ForgeOps: ECR login"
description: "Assumes an AWS role via OIDC and logs Docker into ECR. No-op if role-to-assume is empty."

inputs:
  role-to-assume:
    description: "IAM role ARN to assume via OIDC. Leave empty to skip login entirely."
    required: false
    default: ""
  aws-region:
    description: "AWS region for the OIDC credential exchange and ECR registry"
    required: false
    default: ""
  ecr-registry:
    description: "ECR registry host, e.g. <account-id>.dkr.ecr.<region>.amazonaws.com"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      if: inputs.role-to-assume != ''
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}

    - name: Docker login to ECR
      if: inputs.role-to-assume != ''
      shell: bash
      run: |
        aws ecr get-login-password --region "${{ inputs.aws-region }}" \
          | docker login --username AWS --password-stdin "${{ inputs.ecr-registry }}"
