# Release automation via release-please.
#
# On every push to main, this either opens/updates a "release PR" (a PR
# that accumulates the pending version bump + generated CHANGELOG.md entry
# from conventional commits since the last release) or, if a pending
# release PR was just merged, cuts the actual GitHub Release and tag.
#
# Monorepo-aware via release-please-config.json — right now that config has
# one package (services/auth-service). Onboarding a new service means
# adding an entry to release-please-config.json's "packages" map and an
# initial version entry in .release-please-manifest.json; nothing in this
# workflow file changes.
#
# Tags are of the form "<component>-v<version>" (e.g. "auth-service-v1.2.3")
# per release-please-config.json's component field — that's the format
# .github/workflows/release-image-retag.yml parses to know which service
# and version a release is for.
#
# Note: release-please's config schema has evolved across major versions —
# double check release-please-config.json's exact fields (bump-minor-pre-
# major, tag format, etc.) against the current googleapis/release-please
# docs / v4 action README before relying on this in production, since
# details here may drift from whatever version is current when you run it.
#
# --- Token: why this uses a PAT instead of the default GITHUB_TOKEN ---
#
# "GitHub Actions is not permitted to create or approve pull requests" is
# not fixed by this workflow's `permissions:` block or by the repo-level
# "Allow GitHub Actions to create and approve pull requests" setting
# alone — both were already correct here. That specific restriction can
# also be enforced above the repository (organization policy, and above
# that, GitHub Enterprise policy) — a repo-level checkbox can show as
# enabled while a higher-level policy still silently blocks it. Rather
# than depend on confirming every layer of that hierarchy, this workflow
# supplies a real identity instead of the default GITHUB_TOKEN — the "no
# Actions-created PRs" restriction only ever applies to GITHUB_TOKEN,
# never to a PAT or GitHub App token, since those aren't the identity the
# restriction targets. (If this repo turns out not to sit under an
# org/enterprise policy at all, the PAT approach still works and is what
# this file uses — it just means that wasn't the original cause here.)
#
# Setup (already done for this repo — kept here so the next service/
# environment that copies this file knows what to replicate):
#   1. A fine-grained Personal Access Token was created, scoped to this
#      repository only.
#   2. It's stored as the repository secret RELEASE_PLEASE_TOKEN, which
#      the `token:` input below reads.
#   3. The PAT's own repository permissions (set at token-creation time
#      in GitHub's UI, NOT in this file) must include:
#        - Contents: Read and write   (pushes CHANGELOG.md, version bump
#          commits, tags/releases)
#        - Pull requests: Read and write   (opens/updates the release PR)
#        - Issues: Read and write   (release-please labels the PRs it
#          opens with "autorelease: pending" by default; label writes go
#          through the Issues API even though the label is on a PR — easy
#          to miss, and the failure mode if it's missing looks unrelated:
#          PR creation succeeds, labeling fails.)
#      If PR creation starts succeeding but labeling fails, this is the
#      first thing to check — it's a PAT scope, not a workflow-file fix.
#   4. When this PAT expires (fine-grained PATs have a mandatory max
#      expiry), it needs to be regenerated and the secret updated, or
#      this workflow starts failing again with the same symptom it had
#      before the PAT existed.
#
# This PAT-based approach also fixes a second, unrelated limitation of
# the default GITHUB_TOKEN: PRs/commits it creates do not trigger other
# workflows (GitHub's loop-prevention behavior), so status checks would
# never run on the release PR. A PAT doesn't have that limitation.

name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
