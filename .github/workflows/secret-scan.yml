# Standalone repo-wide secret scanning workflow.
#
# Deliberately NOT a workflow_call / not parameterized per service like the
# other Phase 7 checks: secrets don't respect service directory boundaries,
# so this scans the whole repo on every push and PR rather than being
# invoked once per Go module.
#
# fetch-depth: 0 is required — gitleaks needs full git history to catch
# secrets committed in the past and later removed, not just the current
# tree state.

name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Secret scan summary
        if: always()
        run: |
          {
            echo "## Secret scan (gitleaks)"
            echo "Result: ${{ steps.gitleaks.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
