{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  # Fixed name (not release-revision-suffixed) so a hook-succeeded delete
  # policy can clean it up and the next install/upgrade doesn't collide.
  name: {{ include "auth-service.fullname" . }}-migrate
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
  annotations:
    # Runs before the Deployment is created/updated, so new pods never
    # start against a schema they don't expect.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": {{ .Values.migration.hookWeight | quote }}
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "auth-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "auth-service.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "auth-service.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/migrate", "-direction=up"]
          env:
            {{- include "auth-service.env" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
{{- end }}
