{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "auth-service.fullname" . }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "auth-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
        {{- with .Values.networkPolicy.additionalIngressFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Postgres
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.postgresPort }}
    # Redis
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.redisPort }}
    {{- with .Values.networkPolicy.additionalEgressTo }}
    - to:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}
