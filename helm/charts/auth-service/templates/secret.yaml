{{- if not .Values.secrets.existingSecret }}
# Local/dev convenience only. Staging and production MUST set
# secrets.existingSecret and manage the real Secret out-of-band (e.g.
# External Secrets Operator, Sealed Secrets, SOPS) — see
# examples/values-production.yaml. This template renders regardless so
# `helm template`/`helm install` never silently fails on missing secrets
# in dev; it's the presence of real values that determines whether the
# result is usable, not whether the object exists.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "auth-service.secretName" . }}
  labels:
    {{- include "auth-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DSN: {{ .Values.secrets.postgresDSN | quote }}
  JWT_SIGNING_KEY: {{ .Values.secrets.jwtSigningKey | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
{{- end }}
