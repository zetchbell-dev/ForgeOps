# One-SA-per-workload convention (same pattern grafana/serviceaccount.yaml
# follows in Phase 3). Prometheus's SA is bound to rbac.yaml's
# ClusterRole below (it calls the K8s API to discover scrape targets via
# ServiceMonitor/PodMonitor selectors). Alertmanager never calls the K8s
# API in this setup — no discovery, no dynamic config reload via API — so
# its token is explicitly not mounted, matching Grafana's SA in Phase 3.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  automountServiceAccountToken: false
