# Single-binary Loki (all components in one process) with filesystem
# chunk storage — the logging-stack equivalent of Grafana's sqlite choice
# in Phase 3: right-sized for ForgeOps's current single-cluster scale, not
# a distributed microservices deployment (memcached-backed caching,
# S3/object storage, separate read/write/backend targets). Revisit if log
# volume ever outgrows what a single filesystem-backed process can serve.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/part-of: forgeops
data:
  loki.yaml: |
    auth_enabled: false  # single-tenant platform — same reasoning as
                         # prometheus.yaml's serviceMonitorSelector: {}
                         # comment: no other team's logs to isolate from.

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095

    common:
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory  # single instance — no need for a real ring backend.

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      # 360h (15d) matches prometheus.yaml's `retention: 15d` exactly —
      # deliberate parity so a metrics-vs-logs correlation during an
      # incident investigation never falls outside one system's window
      # while still inside the other's.
      retention_period: 360h
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      # Auth Service's own request volume is modest (see M5 §3's
      # cardinality reasoning) — raise these if the auth-service-prod
      # namespace's log volume ever exceeds this in practice.
      per_stream_rate_limit: 5MB
      per_stream_rate_limit_burst: 15MB

    compactor:
      working_directory: /var/loki/compactor
      retention_enabled: true
      delete_request_store: filesystem

    ruler:
      enable_api: false  # Grafana-native/Loki-native alerting stays off,
                         # same reasoning as configmap-grafana-ini.yaml's
                         # [unified_alerting] disable — Alertmanager
                         # (Phase 2) is the single alerting source of truth.
