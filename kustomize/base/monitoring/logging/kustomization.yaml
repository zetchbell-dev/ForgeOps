# Included as a resource from ../kustomization.yaml, same pattern as
# ../grafana/kustomization.yaml. Own `namespace:` here only matters for
# standalone `kustomize build` of this directory.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - loki-serviceaccount.yaml
  - loki-configmap.yaml
  - loki-pvc.yaml
  - loki-deployment.yaml
  - loki-service.yaml
  - fluentbit-serviceaccount.yaml
  - fluentbit-rbac.yaml
  - fluentbit-configmap.yaml
  - fluentbit-daemonset.yaml
