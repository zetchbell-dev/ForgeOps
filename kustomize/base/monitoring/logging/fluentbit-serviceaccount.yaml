# Unlike Loki/Grafana, Fluent Bit's `kubernetes` filter genuinely calls
# the Kubernetes API (via the in-cluster API server, `kube_url` defaulting
# to https://kubernetes.default.svc) to enrich each log line with pod
# metadata — so, unlike its neighbors in this repo, its token IS mounted.
# See fluentbit-rbac.yaml for the narrow read-only permissions it's
# actually granted.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
