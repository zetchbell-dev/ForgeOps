# Secret name MUST be `alertmanager-alertmanager` — the Operator's fixed
# naming convention for the config Secret of an Alertmanager CR named
# `alertmanager` (alertmanager.yaml's `spec.configSecret`). Key name
# `alertmanager.yaml` is the Operator's default lookup key when
# `configSecretKey` isn't set on the CR.
#
# `slack_api_url` below is a placeholder — replace it out-of-band
# (External Secrets Operator / Sealed Secrets / SOPS) before applying to
# a real cluster. Never commit a real webhook URL (README.md
# prerequisite #2).
#
# Inhibit rule: an AuthServiceDown firing alert suppresses any
# AuthServiceHigh* alert (HighErrorRate, HighLatency) for the same
# `namespace` — no point paging on elevated error rate/latency when the
# service is already known to be down entirely. Matches
# prometheusrule-alerts-auth-service.yaml's alert names exactly.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-alertmanager
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      slack_api_url: "__SLACK_WEBHOOK_URL_PLACEHOLDER__"

    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-default
      routes:
        - match:
            severity: critical
          receiver: slack-critical
          continue: true

    receivers:
      - name: slack-default
        slack_configs:
          - channel: "#forgeops-alerts"
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'
      - name: slack-critical
        slack_configs:
          - channel: "#forgeops-pages"
            send_resolved: true
            title: '{{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'

    inhibit_rules:
      - source_match:
          alertname: AuthServiceDown
        target_match_re:
          alertname: "AuthServiceHigh.*"
        equal: ["namespace"]
