# One-SA-per-workload convention (same as serviceaccount.yaml one level
# up, and grafana/serviceaccount.yaml). otel-collector's SA is bound to
# rbac.yaml's ClusterRole below (the k8sattributes processor in
# otel-collector-configmap.yaml calls the K8s API to enrich spans with
# pod/namespace metadata). Tempo never calls the K8s API in this setup —
# storage is a local PVC, not a dynamic backend needing discovery — so
# its token is explicitly not mounted, matching grafana/loki's pattern.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tempo
  automountServiceAccountToken: false
