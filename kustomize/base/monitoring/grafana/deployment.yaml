# Single replica by design: the sqlite3 backend configured in
# configmap-grafana-ini.yaml has no safe multi-writer story, so running
# more than one replica risks db-lock corruption, not just cache
# inconsistency. Scale to N replicas only after migrating [database] to
# Postgres/MySQL in an overlay — do not raise `replicas` without also
# making that change.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: forgeops
    app.kubernetes.io/part-of: forgeops
spec:
  replicas: 1
  strategy:
    # Recreate, not RollingUpdate: two Grafana pods must never share the
    # single ReadWriteOnce PVC's sqlite file at once. A rolling update
    # briefly runs old+new together; Recreate tears down the old pod
    # (releasing the volume) before starting the new one.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: forgeops
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: forgeops
        app.kubernetes.io/part-of: forgeops
    spec:
      serviceAccountName: grafana
      securityContext:
        runAsNonRoot: true
        # 472 is the `grafana` user baked into the official image
        # (unlike Prometheus/Alertmanager's 65534 "nobody" — Grafana's
        # image doesn't run as nobody and its writable paths are owned
        # by uid/gid 472).
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          # Pin and bump deliberately; check for CVE patches before
          # deploying to production rather than trusting this tag blindly.
          image: grafana/grafana:11.3.1
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_PATHS_CONFIG
              value: /etc/grafana/grafana.ini
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_PATHS_DATA
              value: /var/lib/grafana
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            # Each ConfigMap below is mounted at the exact `path:` each
            # provider in configmap-dashboard-provisioning.yaml declares.
            - name: dashboards-auth-service
              mountPath: /var/lib/grafana/dashboards/auth-service
              readOnly: true
            - name: dashboards-kubernetes
              mountPath: /var/lib/grafana/dashboards/kubernetes
              readOnly: true
            - name: dashboards-platform
              mountPath: /var/lib/grafana/dashboards/platform
              readOnly: true
            - name: dashboards-alerts
              mountPath: /var/lib/grafana/dashboards/alerts
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: config
          configMap:
            name: grafana-config
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provisioning
          configMap:
            name: grafana-dashboard-provisioning
        - name: dashboards-auth-service
          configMap:
            name: grafana-dashboards-auth-service
        - name: dashboards-kubernetes
          configMap:
            name: grafana-dashboards-kubernetes
        - name: dashboards-platform
          configMap:
            name: grafana-dashboards-platform
        - name: dashboards-alerts
          configMap:
            name: grafana-dashboards-alerts
