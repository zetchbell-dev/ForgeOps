# Dedicated ServiceAccount, matching the one-SA-per-workload convention
# used elsewhere (serviceaccount.yaml in the parent directory,
# auth-service base). Unlike Prometheus's SA, Grafana never calls the
# Kubernetes API in this setup (dashboards/datasources are provisioned
# from mounted ConfigMaps, not a dynamic sidecar/K8s-API discovery
# mechanism), so its token is explicitly not mounted.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
automountServiceAccountToken: false
