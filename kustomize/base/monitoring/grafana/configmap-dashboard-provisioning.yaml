# Grafana's file-based dashboard provisioning
# (https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards).
# Each provider's `path` matches a directory this ConfigMap's sibling
# dashboard ConfigMaps (configmap-dashboards-*.yaml) are mounted at in
# deployment.yaml — see that file's volumeMounts for the exact mapping.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: forgeops
data:
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: Auth Service
        orgId: 1
        folder: Auth Service
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards/auth-service

      - name: Kubernetes
        orgId: 1
        folder: Kubernetes
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards/kubernetes

      - name: Platform
        orgId: 1
        folder: Platform
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards/platform

      - name: Alerts
        orgId: 1
        folder: Alerts
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards/alerts
