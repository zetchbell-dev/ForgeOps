# Included as a resource from ../kustomization.yaml (the parent
# monitoring kustomization), which is what actually sets `namespace:
# monitoring` for the combined resource set. This file's own `namespace:`
# below is only so `kustomize build kustomize/base/monitoring/grafana`
# works standalone (e.g. for the static validation this phase runs) —
# harmless duplication, not a conflict, when built via the parent.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - serviceaccount.yaml
  - secret-grafana-admin.yaml
  - pvc.yaml
  - configmap-grafana-ini.yaml
  - configmap-datasources.yaml
  - configmap-dashboard-provisioning.yaml
  - configmap-dashboards-auth-service.yaml
  - configmap-dashboards-kubernetes.yaml
  - configmap-dashboards-platform.yaml
  - configmap-dashboards-alerts.yaml
  - deployment.yaml
  - service.yaml
