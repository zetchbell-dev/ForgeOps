# Grafana's file-based datasource provisioning
# (https://grafana.com/docs/grafana/latest/administration/provisioning/#datasources).
# Prometheus and Loki are wired live. Tempo/Jaeger is still a
# commented-out placeholder — deliberately not made "active-but-broken",
# since Grafana would otherwise show a persistent health-check failure in
# the UI for a service that doesn't exist until Phase 5. Uncomment that
# block once Phase 5's Service exists and its name/port are confirmed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: forgeops
data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      # Points at the Prometheus Operator's fixed governing Service name
      # (same one prometheus.yaml's `alerting.alertmanagers` block and
      # servicemonitor-platform-self.yaml already rely on) — not something
      # this repository names itself.
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-operated.monitoring.svc:9090
        isDefault: true
        jsonData:
          timeInterval: 30s
          httpMethod: POST

      # --- Phase 4 (Logging: Loki + Fluent Bit) ---
      # Confirmed against kustomize/base/monitoring/logging/loki-service.yaml:
      # Service name/port match exactly what was assumed here in Phase 3.
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc:3100
        jsonData:
          maxLines: 1000

      # --- Phase 5 (Tracing: OpenTelemetry + Tempo) ---
      # Confirmed against kustomize/base/monitoring/tracing/tempo-service.yaml:
      # Service name/port match exactly what was assumed here in Phase 3.
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring.svc:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
