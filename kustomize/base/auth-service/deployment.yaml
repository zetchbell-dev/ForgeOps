apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/instance: auth-service
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
      app.kubernetes.io/instance: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/instance: auth-service
    spec:
      serviceAccountName: auth-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          image: ghcr.io/enterprise-cicd-platform/auth-service:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: PORT
            - name: SHUTDOWN_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SHUTDOWN_TIMEOUT
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: REDIS_ADDR
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: REDIS_DB
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: JWT_ISSUER
            - name: JWT_ACCESS_TOKEN_TTL
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: JWT_ACCESS_TOKEN_TTL
            - name: BCRYPT_COST
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: BCRYPT_COST
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: auth-service-credentials
                  key: POSTGRES_DSN
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-service-credentials
                  key: JWT_SIGNING_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-credentials
                  key: REDIS_PASSWORD
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
