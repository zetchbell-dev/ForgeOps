apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: auth-service-staging

resources:
  - ../../../base/auth-service
  - namespace.yaml

commonLabels:
  environment: staging

# Promotion PRs bump this to a SHA already proven in dev (M4 promotion flow),
# not typed manually.
images:
  - name: ghcr.io/enterprise-cicd-platform/auth-service
    newTag: staging

replicas:
  - name: auth-service
    count: 2

patchesStrategicMerge:
  - deployment-patch.yaml

# HPA and PDB are inherited from base unchanged — staging mirrors prod's
# autoscaling/disruption posture at a smaller ceiling (base maxReplicas: 10
# is generous enough for pre-prod load testing without an overlay-specific
# patch).

configMapGenerator:
  - name: auth-service-config
    behavior: merge
    literals:
      - REDIS_ADDR=auth-service-redis-master.auth-service-staging.svc.cluster.local:6379
