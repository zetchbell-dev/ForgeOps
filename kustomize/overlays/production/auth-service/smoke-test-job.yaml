# Standalone smoke-test Job, applied as a regular resource.
#
# This is intentionally separate from analysistemplate.yaml's own inline
# job-provider spec: the AnalysisTemplate's copy is what Argo Rollouts runs
# automatically as part of the canary "analysis" step (see rollout.yaml).
# This Job exists so the same check can also be triggered manually or from
# a CI promotion gate (`kubectl create job --from=job/auth-service-smoke-test
# auth-service-smoke-test-manual -n auth-service-prod`) without needing a
# live Rollout/AnalysisRun in flight.
apiVersion: batch/v1
kind: Job
metadata:
  name: auth-service-smoke-test
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/instance: auth-service
    app.kubernetes.io/component: smoke-test
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/component: smoke-test
    spec:
      restartPolicy: Never
      serviceAccountName: auth-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: smoke-test
          image: curlimages/curl:8.10.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          command:
            - sh
            - -c
            - |
              set -eu
              echo "Checking canary readiness endpoint..."
              curl -sf --max-time 5 "http://auth-service-canary.auth-service-prod.svc.cluster.local/readyz"
              echo "Checking canary health endpoint..."
              curl -sf --max-time 5 "http://auth-service-canary.auth-service-prod.svc.cluster.local/healthz"
              echo "Smoke test passed."
