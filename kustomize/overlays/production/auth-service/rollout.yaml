apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/instance: auth-service
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
      app.kubernetes.io/instance: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
        app.kubernetes.io/instance: auth-service
    spec:
      serviceAccountName: auth-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          image: ghcr.io/enterprise-cicd-platform/auth-service:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: PORT
            - name: SHUTDOWN_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: SHUTDOWN_TIMEOUT
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: REDIS_ADDR
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: REDIS_DB
            - name: JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: JWT_ISSUER
            - name: JWT_ACCESS_TOKEN_TTL
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: JWT_ACCESS_TOKEN_TTL
            - name: BCRYPT_COST
              valueFrom:
                configMapKeyRef:
                  name: auth-service-config
                  key: BCRYPT_COST
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: auth-service-credentials
                  key: POSTGRES_DSN
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-service-credentials
                  key: JWT_SIGNING_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-credentials
                  key: REDIS_PASSWORD
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Overridden to production sizing by resources-patch.yaml
          # (mirrors examples/values-production.yaml from the Phase 1 Helm chart).
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  strategy:
    canary:
      canaryService: auth-service-canary
      stableService: auth-service
      trafficRouting:
        # ALB target-group weighting; matches ingress.className: alb used by
        # the Phase 1 Helm chart's production example values.
        alb:
          ingress: auth-service
          servicePort: 80
      steps:
        - setWeight: 10
        - pause: { duration: 2m }
        - analysis:
            templates:
              - templateName: auth-service-smoke-test
        - setWeight: 30
        - pause: { duration: 5m }
        - setWeight: 60
        - pause: { duration: 5m }
        - setWeight: 100
