apiVersion: v1
kind: Service
metadata:
  name: auth-service-canary
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/instance: auth-service
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  # Selector is managed by the Argo Rollouts controller at runtime
  # (rewritten to target the canary ReplicaSet's pod-template-hash).
  selector:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/instance: auth-service
